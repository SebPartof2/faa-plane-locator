<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'SF Pro Display', system-ui, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      padding: 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 24px; }
    h2 { font-size: 13px; font-weight: 600; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }

    .card {
      background: #111128;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 16px;
    }

    .card-label { font-size: 11px; color: #8e8e93; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card-value { font-size: 28px; font-weight: 700; color: #fff; font-variant-numeric: tabular-nums; }
    .card-value.green { color: #34c759; }
    .card-value.red { color: #ff3b30; }
    .card-value.blue { color: #4fc3f7; }
    .card-value.small { font-size: 18px; }

    .bar-section { margin-bottom: 24px; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .bar-label { font-size: 13px; color: #aaa; width: 60px; text-align: right; flex-shrink: 0; }
    .bar-track { flex: 1; height: 20px; background: #1a1a30; border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; min-width: 2px; }
    .bar-fill.blue { background: #4fc3f7; }
    .bar-fill.green { background: #34c759; }
    .bar-fill.orange { background: #ff9f0a; }
    .bar-fill.purple { background: #af52de; }
    .bar-count { font-size: 12px; color: #666; width: 50px; font-variant-numeric: tabular-nums; }

    .coverage-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .coverage-label { font-size: 13px; color: #aaa; width: 120px; }
    .coverage-bar { flex: 1; height: 8px; background: #1a1a30; border-radius: 4px; overflow: hidden; }
    .coverage-fill { height: 100%; background: #34c759; border-radius: 4px; }
    .coverage-pct { font-size: 13px; color: #fff; width: 45px; text-align: right; font-weight: 600; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .status-dot.on { background: #34c759; }
    .status-dot.off { background: #ff3b30; }

    .conn-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 14px; }

    .updated { font-size: 12px; color: #555; margin-top: 8px; text-align: center; }

    a { color: #4fc3f7; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .nav { margin-bottom: 20px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="nav"><a href="/">&larr; Flights</a></div>
  <h1>System Dashboard</h1>
  <div id="content">Loading...</div>

  <script>
    function fmtUptime(s) {
      const d = Math.floor(s / 86400);
      const h = Math.floor((s % 86400) / 3600);
      const m = Math.floor((s % 3600) / 60);
      if (d > 0) return `${d}d ${h}h ${m}m`;
      if (h > 0) return `${h}h ${m}m`;
      return `${m}m`;
    }

    function pct(n, total) {
      if (!total) return 0;
      return Math.round(n / total * 100);
    }

    function renderBars(items, maxVal, colorClass) {
      return items.map(([label, count]) =>
        `<div class="bar-row">
          <span class="bar-label">${label}</span>
          <div class="bar-track"><div class="bar-fill ${colorClass}" style="width:${Math.max(count/maxVal*100, 1)}%"></div></div>
          <span class="bar-count">${count}</span>
        </div>`
      ).join('');
    }

    async function refresh() {
      try {
        const res = await fetch('/api/health');
        const d = await res.json();
        const total = d.flights.total;

        const statusEntries = Object.entries(d.flights.statuses).sort((a, b) => b[1] - a[1]);
        const maxStatus = statusEntries[0]?.[1] || 1;
        const maxCentre = d.topCentres[0]?.[1] || 1;
        const maxAirline = d.topAirlines[0]?.[1] || 1;
        const maxOrigin = d.topOrigins[0]?.[1] || 1;

        document.getElementById('content').innerHTML = `
          <h2>System</h2>
          <div class="grid">
            <div class="card">
              <div class="card-label">Uptime</div>
              <div class="card-value small">${fmtUptime(d.uptime)}</div>
            </div>
            <div class="card">
              <div class="card-label">Memory</div>
              <div class="card-value small">${d.memory} MB</div>
            </div>
            <div class="card">
              <div class="card-label">FDPS</div>
              <div class="conn-row"><span class="status-dot ${d.connections.fdps ? 'on' : 'off'}"></span> ${d.connections.fdps ? 'Connected' : 'Disconnected'}</div>
            </div>
            <div class="card">
              <div class="card-label">TFMS</div>
              <div class="conn-row"><span class="status-dot ${d.connections.tfms ? 'on' : 'off'}"></span> ${d.connections.tfms ? 'Connected' : 'Disconnected'}</div>
            </div>
          </div>

          <h2>Flights (${total.toLocaleString()} total)</h2>
          <div class="grid">
            ${statusEntries.map(([status, count]) => `
              <div class="card">
                <div class="card-label">${status}</div>
                <div class="card-value">${count.toLocaleString()}</div>
              </div>
            `).join('')}
          </div>

          <h2>Data Coverage</h2>
          <div class="card" style="margin-bottom:24px">
            <div class="coverage-row">
              <span class="coverage-label">Position</span>
              <div class="coverage-bar"><div class="coverage-fill" style="width:${pct(d.coverage.position, total)}%"></div></div>
              <span class="coverage-pct">${pct(d.coverage.position, total)}%</span>
            </div>
            <div class="coverage-row">
              <span class="coverage-label">Aircraft Type</span>
              <div class="coverage-bar"><div class="coverage-fill" style="width:${pct(d.coverage.aircraftType, total)}%"></div></div>
              <span class="coverage-pct">${pct(d.coverage.aircraftType, total)}%</span>
            </div>
            <div class="coverage-row">
              <span class="coverage-label">Airline</span>
              <div class="coverage-bar"><div class="coverage-fill" style="width:${pct(d.coverage.airline, total)}%"></div></div>
              <span class="coverage-pct">${pct(d.coverage.airline, total)}%</span>
            </div>
            <div class="coverage-row">
              <span class="coverage-label">Route</span>
              <div class="coverage-bar"><div class="coverage-fill" style="width:${pct(d.coverage.route, total)}%"></div></div>
              <span class="coverage-pct">${pct(d.coverage.route, total)}%</span>
            </div>
          </div>

          <h2>Lookups</h2>
          <div class="grid" style="margin-bottom:24px">
            <div class="card">
              <div class="card-label">Airports</div>
              <div class="card-value blue">${d.lookups.airports}</div>
            </div>
            <div class="card">
              <div class="card-label">Airlines</div>
              <div class="card-value blue">${d.lookups.airlines}</div>
            </div>
          </div>

          <h2>Top Centres</h2>
          <div class="bar-section">${renderBars(d.topCentres, maxCentre, 'blue')}</div>

          <h2>Top Airlines</h2>
          <div class="bar-section">${renderBars(d.topAirlines, maxAirline, 'green')}</div>

          <h2>Top Origins</h2>
          <div class="bar-section">${renderBars(d.topOrigins, maxOrigin, 'orange')}</div>

          <h2>Top Destinations</h2>
          <div class="bar-section">${renderBars(d.topDestinations, maxOrigin, 'purple')}</div>

          <div class="updated">Auto-refreshes every 10s</div>
        `;
      } catch (e) {
        document.getElementById('content').innerHTML = '<p style="color:#ff3b30">Failed to load health data</p>';
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
